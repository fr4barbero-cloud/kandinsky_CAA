<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kandinsky – colori, emozioni, suoni e forme</title>
<style>
:root {
  --ink:#171717; --paper:#fffdf7; --focus:#005fcc;
  --shadow:0 9px 0 #171717;
}
* { box-sizing:border-box; }
html,body { margin:0; min-height:100%; }
body {
  font-family:Arial, Helvetica, sans-serif;
  color:var(--ink);
  background:linear-gradient(135deg,#fff7d5,#eef7ff);
}
button { font:inherit; }
[hidden] { display:none !important; }

.top {
  text-align:center;
  padding:24px 16px 8px;
}
.top h1 {
  margin:0;
  font-size:clamp(2.4rem,8vw,5.4rem);
  letter-spacing:.05em;
}
.caa-kandinsky-placeholder { display:none; 
  width:min(900px,94vw);
  min-height:110px;
  margin:18px auto 8px;
  border:4px dashed #777;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.75);
}
/* Lo spazio è intenzionalmente senza testo visibile: accoglierà l'immagine CAA di Kandinsky. */

.home-grid {
  display:grid;
  grid-template-columns:repeat(2,minmax(240px,1fr));
  gap:26px;
  max-width:1080px;
  margin:22px auto 48px;
  padding:0 18px;
}
.category {
  border:5px solid var(--ink);
  border-radius:28px;
  background:#fff;
  padding:10px;
  min-height:275px;
  cursor:pointer;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .16s,box-shadow .16s;
}
.category:hover { transform:translateY(-4px); box-shadow:0 13px 0 var(--ink); }
.category img { width:100%; height:255px; object-fit:contain; }
.category:focus-visible,.action-image:focus-visible,.nav-button:focus-visible,.choice:focus-visible,.close:focus-visible {
  outline:6px solid var(--focus); outline-offset:4px;
}

.modal {
  position:fixed; inset:0; z-index:30;
  display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,.75); padding:18px;
}
.modal.open { display:flex; }
.modal-card {
  position:relative;
  width:min(880px,97vw);
  max-height:95vh;
  overflow:auto;
  background:white;
  border:5px solid var(--ink);
  border-radius:28px;
  padding:76px 24px 26px;
}
.close {
  position:absolute; right:14px; top:12px;
  width:58px; height:58px;
  border:4px solid var(--ink);
  border-radius:50%;
  background:white;
  font-size:2.1rem; font-weight:900; cursor:pointer;
}
.action-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:28px;
}
.action-image {
  min-height:290px;
  border:5px solid var(--ink);
  border-radius:24px;
  background:white;
  padding:8px;
  cursor:pointer;
  box-shadow:0 6px 0 var(--ink);
}
.action-image img { width:100%; height:270px; object-fit:contain; }

.screen {
  position:fixed; inset:0; z-index:40;
  background:#fff;
  display:none;
}
.screen.open { display:block; }
.screen-bar {
  height:74px;
  border-bottom:4px solid var(--ink);
  background:#fff;
  display:flex;
  align-items:center;
  padding:8px 14px;
}
.nav-button {
  border:4px solid var(--ink);
  border-radius:16px;
  background:white;
  padding:10px 18px;
  font-size:1.2rem;
  font-weight:900;
  cursor:pointer;
}
.screen-content {
  height:calc(100vh - 74px);
  overflow:auto;
}
#exploreHost { width:100%; min-height:100%; background:#f7f7f7; }

.cold-explore {
  padding:24px;
  text-align:center;
  background:#f4f8ff;
  min-height:100%;
}
.cold-explore h2 { font-size:clamp(2rem,6vw,4rem); margin:0 0 26px; }
.cold-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:24px;
  max-width:1050px;
  margin:auto;
}
.cold-card {
  background:white;
  border:4px solid var(--ink);
  border-radius:24px;
  padding:18px;
  box-shadow:0 7px 0 var(--ink);
}
.swatch { height:135px; border:3px solid var(--ink); border-radius:17px; }
.cold-name { font-size:2rem; font-weight:900; margin:14px 0; }
.emotion-button {
  border:0; background:white; cursor:pointer; width:100%;
}
.emotion-button img,.cold-card>img {
  width:100%; max-width:240px; height:190px; object-fit:contain;
}

.test-area {
  min-height:100%;
  padding:24px;
  background:#fffaf0;
}
.test-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:30px; max-width:1100px; margin:auto;
}
.test-column { display:grid; gap:17px; align-content:start; }
.choice {
  border:4px solid var(--ink);
  border-radius:22px;
  min-height:160px;
  padding:12px;
  background:white;
  cursor:pointer;
  box-shadow:0 5px 0 var(--ink);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
}
.choice.selected { outline:7px solid #ffbe00; outline-offset:2px; }
.choice.matched { opacity:.38; pointer-events:none; box-shadow:none; }
.color-square {
  width:112px; height:112px;
  border:3px solid var(--ink); border-radius:15px; flex:none;
}
.color-name { font-size:clamp(1.35rem,3vw,2rem); font-weight:900; }
.choice img { width:100%; max-width:245px; height:145px; object-fit:contain; }
.feedback {
  min-height:75px;
  text-align:center;
  font-size:clamp(1.8rem,5vw,3rem);
  font-weight:900;
  margin:22px auto;
}
.confetti {
  position:fixed; top:-30px; z-index:100;
  width:13px; height:24px;
  pointer-events:none;
  animation:fall 3.2s linear forwards;
}
@keyframes fall {
  to { transform:translateY(115vh) rotate(1000deg); opacity:.95; }
}

@media (max-width:720px) {
  .home-grid,.action-grid,.test-grid { grid-template-columns:1fr; }
  .category { min-height:225px; }
  .category img { height:210px; }
  .action-image { min-height:230px; }
  .action-image img { height:215px; }
  .modal-card { padding:75px 14px 20px; }
}
</style>
</head>
<body>
<header class="top">
  <h1>KANDINSKY</h1>
  
</header>

<main class="home-grid" aria-label="Sezioni">
  <button class="category" data-section="warm" aria-label="Colori caldi">
    <img src="coloricaldi(1).JPG" alt="Colori caldi">
  </button>
  <button class="category" data-section="non" aria-label="Non colori">
    <img src="noncolori(1).JPG" alt="Non colori">
  </button>
  <button class="category" data-section="cold" aria-label="Colori freddi">
    <img src="colorifreddi.JPG" alt="Colori freddi">
  </button>
  <button class="category" data-section="shapes" aria-label="Forme">
    <img src="forme(1).JPG" alt="Forme">
  </button>
</main>

<div id="chooser" class="modal" role="dialog" aria-modal="true" aria-label="Scegli attività">
  <div class="modal-card">
    <button class="close" id="closeChooser" aria-label="Chiudi">×</button>
    <div class="action-grid">
      <button id="exploreAction" class="action-image" aria-label="Esplorare">
        <img src="esplorarecaa.png" alt="Esplorare">
      </button>
      <button id="testAction" class="action-image" aria-label="Test">
        <img src="testcaa.png" alt="Test">
      </button>
    </div>
  </div>
</div>

<section id="exploreScreen" class="screen" aria-label="Esplorazione">
  <div class="screen-bar"><button class="nav-button" id="exploreHome">← HOME</button></div>
  <div class="screen-content"><div id="exploreHost"></div></div>
</section>

<section id="testScreen" class="screen" aria-label="Test di abbinamento">
  <div class="screen-bar"><button class="nav-button" id="testHome">← HOME</button></div>
  <div class="screen-content test-area">
    <div class="test-grid">
      <div id="colorsColumn" class="test-column"></div>
      <div id="emotionsColumn" class="test-column"></div>
    </div>
    <div id="feedback" class="feedback" aria-live="polite"></div>
  </div>
</section>

    {id:"marrone",name:"MARRONE",color:"#8b5a2b",img:"marrone - rabbia(2).png"},
    {id:"grigio",name:"GRIGIO",color:"#9e9e9e",img:"grigio - stanco(3).png"},
    {id:"nero",name:"NERO",color:"#000000",img:"nero - paura(2).png"},
    {id:"bianco",name:"BIANCO",color:"#ffffff",img:"bianco - stanco(3).png"}
  ],
  cold: [
    {id:"azzurro",name:"AZZURRO",color:"#4cc9f0",img:"azzurro(4).png"},
    {id:"blu",name:"BLU",color:"#1d4ed8",img:"blu(3).png"},
    {id:"verde",name:"VERDE",color:"#2ecc71",img:"verde(2).png"},
    {id:"viola",name:"VIOLA",color:"#7b2cbf",img:"viola(2).png"}
  ]
};

let section = null;
let selectedColor = null;
let selectedEmotion = null;
let matched = 0;

const chooser = document.getElementById("chooser");
const exploreScreen = document.getElementById("exploreScreen");
const testScreen = document.getElementById("testScreen");
const testAction = document.getElementById("testAction");

document.querySelectorAll(".category").forEach(btn => {
  btn.addEventListener("click", () => {
    section = btn.dataset.section;
    testAction.hidden = section === "shapes";
    chooser.classList.add("open");
    document.getElementById("closeChooser").focus();
  });
});

function closeChooser() { chooser.classList.remove("open"); }
document.getElementById("closeChooser").addEventListener("click", closeChooser);
chooser.addEventListener("click", e => { if (e.target === chooser) closeChooser(); });

document.getElementById("exploreAction").addEventListener("click", () => {
  closeChooser();
  openExplore(section);
});
testAction.addEventListener("click", () => {
  closeChooser();
  buildTest(section);
});

document.getElementById("exploreHome").addEventListener("click", closeScreens);
document.getElementById("testHome").addEventListener("click", closeScreens);

function stopAllAudio(root=document) {
  root.querySelectorAll("audio").forEach(a => { a.pause(); a.currentTime = 0; });
  const host = document.getElementById("exploreHost");
  if (host.shadowRoot) host.shadowRoot.querySelectorAll("audio").forEach(a => { a.pause(); a.currentTime=0; });
}
function closeScreens() {
  stopAllAudio();
  exploreScreen.classList.remove("open");
  testScreen.classList.remove("open");
  document.getElementById("exploreHost").replaceChildren();
}

function openExplore(key) {
  const host = document.getElementById("exploreHost");
  host.replaceChildren();

  const data = ORIGINAL_SECTIONS[key];
  const shell = document.createElement("div");
  host.appendChild(shell);
  const shadow = shell.attachShadow({mode:"open"});
  shadow.innerHTML = `<style>${data.styles}</style><div class="root">${data.body}</div>`;

  shadow.querySelectorAll(".integrated-sound-button").forEach(button => {
    button.addEventListener("click", () => {
      shadow.querySelectorAll("audio").forEach(a => {
        a.pause();
        a.currentTime = 0;
      });
      const cell = button.closest("td");
      const audio = cell ? cell.querySelector("audio") : null;
      if (audio) audio.play().catch(() => {});
    });
  });

  exploreScreen.classList.add("open");
  document.querySelector("#exploreScreen .screen-content").scrollTop = 0;
}
function shuffle(items) {
  const a = [...items];
  for (let i=a.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildTest(key) {
  selectedColor = null;
  selectedEmotion = null;
  matched = 0;

  const colors = document.getElementById("colorsColumn");
  const emotions = document.getElementById("emotionsColumn");
  const feedback = document.getElementById("feedback");

  colors.replaceChildren();
  emotions.replaceChildren();
  feedback.textContent = "";

  TESTS[key].forEach(pair => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "choice";
    button.dataset.id = pair.id;
    button.setAttribute("aria-label", pair.name);

    const square = document.createElement("span");
    square.className = "color-square";
    square.style.background = pair.color;

    const name = document.createElement("span");
    name.className = "color-name";
    name.textContent = pair.name;

    button.append(square, name);
    button.addEventListener("click", () => selectChoice("color", button, pair.id));
    colors.appendChild(button);
  });

  shuffle(TESTS[key]).forEach(pair => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "choice";
    button.dataset.id = pair.id;
    button.setAttribute("aria-label", "Emozione da abbinare");

    const image = document.createElement("img");
    image.src = pair.img;
    image.alt = "Immagine CAA dell'emozione da abbinare";
    image.loading = "eager";

    button.appendChild(image);
    button.addEventListener("click", () => selectChoice("emotion", button, pair.id));
    emotions.appendChild(button);
  });

  testScreen.classList.add("open");
  document.querySelector("#testScreen .screen-content").scrollTop = 0;
}
function selectChoice(type, element, id) {
  const selector = type === "color" ? "#colorsColumn .choice" : "#emotionsColumn .choice";
  document.querySelectorAll(selector).forEach(el => el.classList.remove("selected"));
  element.classList.add("selected");
  if (type === "color") selectedColor = {element,id};
  else selectedEmotion = {element,id};
  if (selectedColor && selectedEmotion) checkMatch();
}

function checkMatch() {
  const feedback = document.getElementById("feedback");
  if (selectedColor.id === selectedEmotion.id) {
    selectedColor.element.classList.remove("selected");
    selectedEmotion.element.classList.remove("selected");
    selectedColor.element.classList.add("matched");
    selectedEmotion.element.classList.add("matched");
    matched++;
    feedback.textContent = "BRAVO!";
    if (matched === TESTS[section].length) {
      feedback.textContent = "BRAVISSIMO!";
      launchConfetti();
    }
  } else {
    selectedColor.element.classList.remove("selected");
    selectedEmotion.element.classList.remove("selected");
    feedback.textContent = "RIPROVA";
  }
  selectedColor = null; selectedEmotion = null;
}

function launchConfetti() {
  const colors=["#ff1744","#ffea00","#00e676","#2979ff","#d500f9","#ff9100","#00bcd4"];
  for (let i=0; i<190; i++) {
    const piece=document.createElement("span");
    piece.className="confetti";
    piece.style.left=(Math.random()*100)+"vw";
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay=(Math.random()*.9)+"s";
    piece.style.animationDuration=(2.6+Math.random()*1.4)+"s";
    piece.style.borderRadius=Math.random()>.5?"50%":"2px";
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),4500);
  }
}
</script>
