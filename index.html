<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kandinsky – colori, suoni, emozioni e forme</title>
<style>
:root{--ink:#171717;--bg:#fff8df;--focus:#005fcc}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#fff4cb,#eaf6ff);color:var(--ink);min-height:100vh}
button{font:inherit}
header{text-align:center;padding:24px 15px 8px}
h1{font-size:clamp(2.6rem,8vw,5.2rem);margin:0;letter-spacing:.05em}
.home-grid{display:grid;grid-template-columns:repeat(2,minmax(230px,1fr));gap:26px;max-width:1080px;margin:24px auto 50px;padding:0 18px}
.category,.action,.choice,.sound-btn{border:5px solid #111;border-radius:24px;background:#fff;cursor:pointer;box-shadow:0 7px 0 #111}
.category{padding:10px;min-height:270px}
.category img{width:100%;height:250px;object-fit:contain}
.category:focus-visible,.action:focus-visible,.choice:focus-visible,.sound-btn:focus-visible,.close:focus-visible,.home:focus-visible{outline:6px solid var(--focus);outline-offset:4px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:30;align-items:center;justify-content:center;padding:18px}
.modal.open{display:flex}
.modal-card{position:relative;width:min(900px,97vw);background:#fff;border:5px solid #111;border-radius:28px;padding:75px 22px 25px}
.close{position:absolute;right:12px;top:10px;width:58px;height:58px;border:4px solid #111;border-radius:50%;background:#fff;font-size:2rem;font-weight:900;cursor:pointer}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.action{padding:8px;min-height:270px}
.action img{width:100%;height:250px;object-fit:contain}
.screen{display:none;position:fixed;inset:0;background:#fff;z-index:40}
.screen.open{display:block}
.bar{height:72px;border-bottom:4px solid #111;display:flex;align-items:center;padding:8px 14px;background:#fff}
.home{border:4px solid #111;border-radius:15px;background:#fff;padding:10px 18px;font-weight:900;cursor:pointer}
.content{height:calc(100vh - 72px);overflow:auto;padding:22px;background:#f7f7f7}
h2{text-align:center;font-size:clamp(2rem,6vw,4rem);margin:0 0 24px}
.activity-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:22px;max-width:1100px;margin:auto}
.card{background:#fff;border:4px solid #111;border-radius:24px;padding:16px;text-align:center;box-shadow:0 6px 0 #111}
.swatch{height:120px;border:3px solid #111;border-radius:15px}
.name{font-size:1.8rem;font-weight:900;margin:12px 0}
.sound-btn{padding:10px;margin-bottom:12px;min-width:80px;font-size:2rem}
.card img{width:100%;max-width:230px;height:180px;object-fit:contain}
.test-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;max-width:1100px;margin:auto}
.test-column{display:grid;gap:16px}
.choice{min-height:155px;padding:12px;display:flex;align-items:center;justify-content:center;gap:18px}
.choice.selected{outline:7px solid #ffbe00;outline-offset:2px}
.choice.matched{opacity:.4;pointer-events:none;box-shadow:none}
.square{width:105px;height:105px;border:3px solid #111;border-radius:14px;flex:none}
.choice img{width:100%;max-width:240px;height:140px;object-fit:contain}
.feedback{text-align:center;min-height:70px;font-size:clamp(1.8rem,5vw,3rem);font-weight:900;margin:22px}
.confetti{position:fixed;top:-25px;width:13px;height:23px;z-index:100;pointer-events:none;animation:fall 3.2s linear forwards}
@keyframes fall{to{transform:translateY(115vh) rotate(1000deg);opacity:.95}}
@media(max-width:720px){.home-grid,.action-grid,.test-grid{grid-template-columns:1fr}.category img{height:210px}.action img{height:210px}}
</style>
</head>
<body>
<header><h1>KANDINSKY</h1></header>

<main class="home-grid">
<button class="category" data-section="warm" aria-label="Colori caldi"><img src="coloricaldi.JPG" alt="Colori caldi"></button>
<button class="category" data-section="non" aria-label="Non colori"><img src="noncolori.JPG" alt="Non colori"></button>
<button class="category" data-section="cold" aria-label="Colori freddi"><img src="colorifreddi.JPG" alt="Colori freddi"></button>
<button class="category" data-section="shapes" aria-label="Forme"><img src="forme.JPG" alt="Forme"></button>
</main>

<div id="chooser" class="modal" role="dialog" aria-modal="true" aria-label="Scegli attività">
<div class="modal-card">
<button id="closeChooser" class="close" aria-label="Chiudi">×</button>
<div class="action-grid">
<button id="exploreAction" class="action" aria-label="Esplorare"><img src="esplorarecaa.png" alt="Esplorare"></button>
<button id="testAction" class="action" aria-label="Test"><img src="testcaa.png" alt="Test"></button>
</div>
</div>
</div>

<section id="exploreScreen" class="screen">
<div class="bar"><button class="home" data-home>← HOME</button></div>
<div id="exploreContent" class="content"></div>
</section>

<section id="testScreen" class="screen">
<div class="bar"><button class="home" data-home>← HOME</button></div>
<div class="content">
<div class="test-grid"><div id="colorsColumn" class="test-column"></div><div id="emotionsColumn" class="test-column"></div></div>
<div id="feedback" class="feedback" aria-live="polite"></div>
</div>
</section>

<script>
const sections={
warm:[
{name:"GIALLO",color:"#ffd400",img:"giallo - felicissimo.png",audio:"giallo tromba.mp3"},
{name:"ARANCIONE",color:"#f77f00",img:"arancione - energico.png",audio:"arancione camapana.mp3"},
{name:"ROSSO",color:"#d62828",img:"rosso - eccitato.png",audio:"rosso tuba.mp3"}],
non:[
{name:"MARRONE",color:"#8b5a2b",img:"marrone - rabbia.png",audio:"marrone contrabbasso.mp3"},
{name:"GRIGIO",color:"#9e9e9e",img:"grigio - stanco.png",audio:"grigio flauto.mp3"},
{name:"NERO",color:"#000",img:"nero - paura.png",audio:"nero.mp3"},
{name:"BIANCO",color:"#fff",img:"bianco - stanco.png",audio:null}],
cold:[
{name:"AZZURRO",color:"#4cc9f0",img:"azzurro.png",audio:"azzurro flauto.mp3"},
{name:"BLU",color:"#1d4ed8",img:"blu.png",audio:"blu cello.mp3"},
{name:"VERDE",color:"#2ecc71",img:"verde.png",audio:"verde violino.mp3"},
{name:"VIOLA",color:"#7b2cbf",img:"viola.png",audio:"viola fagotto.mp3"}],
shapes:[
{name:"TRIANGOLO",img:"triangolo.png",audio:"triangolo.mp3"},
{name:"CERCHIO",img:"cerchio.png",audio:"cerchio.mp3"},
{name:"RAGGI",img:"raggi.png",audio:"raggi.mp3"},
{name:"LINEA A ZIG ZAG",img:"linea a zig zag.png",audio:"linea frastagliata.mp3"},
{name:"LINEA ONDULATA",img:"lineaondulata.png",audio:"linea ondulata.mp3"},
{name:"LINEA SPEZZATA",img:"lineaspezzata.png",audio:"linea spezzata.mp3"},
{name:"LINEA AGGROVIGLIATA",img:"lineaaggrovigliata.png",audio:"linea aggrovigliata.mp3"},
{name:"LINEA A SPIRALE",img:"spirale.png",audio:"linea a spirale.mp3"}]
};
let current=null,selectedColor=null,selectedEmotion=null,matched=0;
const chooser=document.getElementById("chooser"),testAction=document.getElementById("testAction");
document.querySelectorAll(".category").forEach(b=>b.onclick=()=>{current=b.dataset.section;testAction.hidden=current==="shapes";chooser.classList.add("open")});
document.getElementById("closeChooser").onclick=()=>chooser.classList.remove("open");
chooser.onclick=e=>{if(e.target===chooser)chooser.classList.remove("open")};
document.getElementById("exploreAction").onclick=()=>{chooser.classList.remove("open");openExplore()};
testAction.onclick=()=>{chooser.classList.remove("open");openTest()};
document.querySelectorAll("[data-home]").forEach(b=>b.onclick=closeScreens);
function closeScreens(){document.querySelectorAll("audio").forEach(a=>{a.pause();a.currentTime=0});document.querySelectorAll(".screen").forEach(s=>s.classList.remove("open"))}
function openExplore(){
const c=document.getElementById("exploreContent");c.innerHTML=`<h2>${current==="warm"?"COLORI CALDI":current==="non"?"NON COLORI":current==="cold"?"COLORI FREDDI":"FORME"}</h2><div class="activity-grid"></div>`;
const g=c.querySelector(".activity-grid");
sections[current].forEach(x=>{
const card=document.createElement("article");card.className="card";
if(x.color){const sw=document.createElement("div");sw.className="swatch";sw.style.background=x.color;card.appendChild(sw)}
const n=document.createElement("div");n.className="name";n.textContent=x.name;card.appendChild(n);
if(x.audio){const b=document.createElement("button");b.className="sound-btn";b.textContent="♪";b.setAttribute("aria-label","Ascolta "+x.name);const a=document.createElement("audio");a.src=x.audio;b.onclick=()=>{document.querySelectorAll("audio").forEach(z=>{z.pause();z.currentTime=0});a.play().catch(()=>{})};card.append(b,a)}
const im=document.createElement("img");im.src=x.img;im.alt=x.name;card.appendChild(im);g.appendChild(card)});
document.getElementById("exploreScreen").classList.add("open")}
function openTest(){selectedColor=selectedEmotion=null;matched=0;const cc=document.getElementById("colorsColumn"),ec=document.getElementById("emotionsColumn"),f=document.getElementById("feedback");cc.innerHTML=ec.innerHTML="";f.textContent="";
sections[current].forEach((x,i)=>{const b=document.createElement("button");b.className="choice";b.dataset.id=i;b.innerHTML=`<span class="square" style="background:${x.color}"></span><strong>${x.name}</strong>`;b.onclick=()=>select("c",b,i);cc.appendChild(b)});
[...sections[current]].map((x,i)=>({...x,id:i})).sort(()=>Math.random()-.5).forEach(x=>{const b=document.createElement("button");b.className="choice";b.dataset.id=x.id;const im=document.createElement("img");im.src=x.img;im.alt="Emozione da abbinare";b.appendChild(im);b.onclick=()=>select("e",b,x.id);ec.appendChild(b)});
document.getElementById("testScreen").classList.add("open")}
function select(t,b,id){document.querySelectorAll(t==="c"?"#colorsColumn .choice":"#emotionsColumn .choice").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");if(t==="c")selectedColor={b,id};else selectedEmotion={b,id};if(selectedColor&&selectedEmotion)check()}
function check(){const f=document.getElementById("feedback");if(selectedColor.id===selectedEmotion.id){selectedColor.b.classList.replace("selected","matched");selectedEmotion.b.classList.replace("selected","matched");matched++;f.textContent="BRAVO!";if(matched===sections[current].length){f.textContent="BRAVISSIMO!";confetti()}}else{selectedColor.b.classList.remove("selected");selectedEmotion.b.classList.remove("selected");f.textContent="RIPROVA"}selectedColor=selectedEmotion=null}
function confetti(){const cs=["#ff1744","#ffea00","#00e676","#2979ff","#d500f9","#ff9100"];for(let i=0;i<180;i++){const p=document.createElement("span");p.className="confetti";p.style.left=Math.random()*100+"vw";p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.animationDelay=Math.random()*.8+"s";document.body.appendChild(p);setTimeout(()=>p.remove(),4300)}}
</script>
</body>
</html>
